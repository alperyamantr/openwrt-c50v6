name: Build OpenWrt 25.12.5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 --branch v25.12.5 https://github.com/openwrt/openwrt.git

      - name: Show version
        run: |
          cd openwrt
          cat version