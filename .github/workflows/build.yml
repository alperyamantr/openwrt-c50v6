name: Build OpenWrt 25.12.5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3-setuptools rsync \
            swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 --branch v25.12.5 https://github.com/openwrt/openwrt.git

      - name: Copy profile
        run: |
          cp profiles/c50v6-minimal.config openwrt/.config

      - name: Copy custom files
        run: |
          mkdir -p openwrt/files
          cp -a files/. openwrt/files/

      - name: Prepare config
        run: |
          cd openwrt
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-c50v6
          path: |
            openwrt/bin/targets/**/*