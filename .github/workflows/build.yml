name: Build OpenWrt 25.12.5

on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: v25.12.5

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3-setuptools rsync \
            swig unzip zlib1g-dev file wget curl jq

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 --branch ${OPENWRT_VERSION} https://github.com/openwrt/openwrt.git

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Update USOM banned list
        run: |
          chmod +x scripts/banned_conf-guncelle.sh
          ./scripts/banned_conf-guncelle.sh

      - name: Prepare build
        working-directory: openwrt
        run: |
          chmod +x ../scripts/*.sh
          ../scripts/prepare.sh
          echo "==> LuCI"
          grep "CONFIG_PACKAGE_luci" .config || true
          echo "==> Disabled"
          grep "CONFIG_PACKAGE_ppp\|CONFIG_PACKAGE_odhcp" .config || true

      - name: Copy custom files
        run: |
          mkdir -p openwrt/files
          cp -a files/. openwrt/files/

      - name: Optimize build
        working-directory: openwrt
        run: |
          ../scripts/optimize.sh

      - name: Verify config
        working-directory: openwrt
        run: |
          ./scripts/diffconfig.sh > diffconfig.txt
          echo "==> Unwanted packages check"
          if grep -E "CONFIG_PACKAGE_(procd-ujail|procd-seccomp|kmod-usb-core|kmod-ppp|ppp|odhcp6c)=y" diffconfig.txt; then
            echo "ERROR: Unwanted packages found!"
            cat diffconfig.txt | grep -E "CONFIG_PACKAGE_(procd-ujail|procd-seccomp|kmod-usb-core|kmod-ppp|ppp|odhcp6c)"
            exit 1
          fi
          echo "==> Mount chain check"
          grep "CONFIG_PACKAGE_fstools=y" diffconfig.txt || (echo "ERROR: fstools missing!" && exit 1)
          grep "CONFIG_PACKAGE_block-mount=y" diffconfig.txt || (echo "ERROR: block-mount missing!" && exit 1)
          echo "==> ZRAM check"
          grep "CONFIG_PACKAGE_zram-swap=y" diffconfig.txt || (echo "ERROR: zram-swap missing!" && exit 1)
          grep "CONFIG_PACKAGE_kmod-zram=y" diffconfig.txt || (echo "ERROR: kmod-zram missing!" && exit 1)
          echo "==> All checks passed"

      - name: Show target
        working-directory: openwrt
        run: |
          grep '^CONFIG_TARGET' .config

      - name: Download sources
        working-directory: openwrt
        run: |
          make download -j"$(nproc)"

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" V=s

      - name: Generate checksums
        working-directory: openwrt/bin/targets
        run: |
          find . -type f ! -name sha256sums.txt -exec sha256sum {} \; | sort > sha256sums.txt

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-c50v6-${{ github.run_number }}
          compression-level: 0
          if-no-files-found: error
          path: |
            openwrt/bin/targets/**